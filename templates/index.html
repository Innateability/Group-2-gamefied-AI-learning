<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gamified Learning</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#06b6d4,#0f172a);
    color: white;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Center card */
.card {
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    width: 300px;
    text-align: center;
}

/* Inputs and buttons stacked properly */
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
}

input {
    background: #334155;
    color: white;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #2563eb;
    transform: scale(1.05);
}

h1 {
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="card">
    <h1>🤖 AI Learning</h1>
    <p>Start your personalized math journey</p>

    <input id="name" placeholder="Enter your name" />
    <button onclick="start()">🚀 Start Test</button>
</div>

<script>
async function start(){
    const userId = document.getElementById("name").value;

    if(!userId){
        alert("Please enter your name");
        return;
    }

    localStorage.setItem("user", userId);

    await fetch("/start", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:userId})
    });

    window.location.href="/game";
}
</script>

</body>
</html>
