<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Placement Test</title>
<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e3a8a,#0f172a);
    color:white;
    margin:0;
    display:flex;
    flex-direction:column;
    align-items:center;
}
.container{
    max-width:700px;
    margin-top:30px;
    width:90%;
}
.card{
    background: rgba(255,255,255,0.08);
    padding:25px;
    border-radius:25px;
    margin-bottom:20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: transform 0.2s;
}
.card:hover{ transform: translateY(-5px);}
button{
    margin:10px 0;
    padding:12px 20px;
    border:none;
    border-radius:15px;
    background:#3b82f6;
    cursor:pointer;
    transition:0.3s;
    display:block;
    width:100%;
    font-weight:bold;
}
button:hover{ background:#2563eb; transform:scale(1.05);}
.feedback{
    margin-top:10px;
    font-size:16px;
    font-weight:bold;
}
.progress{
    margin-bottom:10px;
    font-size:14px;
}
#scoreBox{
    position:fixed;
    top:20px;
    right:20px;
    background:#1e293b;
    padding:10px 20px;
    border-radius:10px;
}
</style>
</head>
<body>
<div id="scoreBox">
    Score: <span id="score">0</span>/10
</div>

<div class="container">

    <!-- QUESTION CARD -->
    <div id="question_card" class="card">
        <div class="progress" id="progress"></div>
        <h2 id="topic"></h2>
        <h3 id="subtopic"></h3>
        <p id="question"></p>
        <div id="options"></div>
        <p id="feedback" class="feedback"></p>
    </div>

</div>

<script>
const user = localStorage.getItem("user");
let currentQuestion = null;
let questionIndex = 0;
let score = 0;
const totalQuestions = 10;

// Load next question
async function loadQuestion() {
    const res = await fetch("/next?user_id=" + user);
    const data = await res.json();

    if (data.done || questionIndex >= totalQuestions) {
        // Hide question card
        document.getElementById("question_card").style.display = "none";

        // Show final score card with button redirect
        const container = document.querySelector(".container");
        const scoreCard = document.createElement("div");
        scoreCard.className = "card";
        scoreCard.innerHTML = `
            <h2>🏁 Test Completed!</h2>
            <h3>Your Score: ${score} / ${totalQuestions}</h3>
            <button id="showPlanBtn">See Personalized Learning Plan</button>
        `;
        container.appendChild(scoreCard);

        // Correct button redirect
        document.getElementById("showPlanBtn").onclick = () => {
            window.location.href = "/study_plan?user_id=" + user;
        };

        return;
    }

    currentQuestion = data;
    questionIndex++;

    document.getElementById("topic").innerText = data.topic;
    document.getElementById("subtopic").innerText = data.subtopic;
    document.getElementById("question").innerText = data.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    data.options.forEach(opt => {
        const b = document.createElement("button");
        b.innerText = opt;
        b.onclick = () => submitAnswer(opt);
        optionsDiv.appendChild(b);
    });

    document.getElementById("feedback").innerText = "";
    document.getElementById("progress").innerText = `Question ${questionIndex} of ${totalQuestions}`;
    document.getElementById("score").innerText = score;
}

// Submit answer
async function submitAnswer(ans) {
    const res = await fetch("/answer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({user_id: user, answer: ans})
    });

    const data = await res.json();

    if (data.correct) {
        score++;
        document.getElementById("feedback").innerText = "✅ Correct!";
    } else {
        document.getElementById("feedback").innerText = "❌ Wrong! Answer: " + data.answer;
    }

    document.getElementById("score").innerText = score;

    setTimeout(loadQuestion, 800);
}

// Initial load
loadQuestion();
</script>

</body>
</html>
